# This launch file is for science payload servos
launch:

- node:
    pkg: "servo"
    exec: "servo_node"
    name: "servo_node"
    namespace: "science_scooper"
    param:
    - {name: "channel_id", value: 2}
    - {name: "initial_angle_deg", value: 90}
    - {name: "min_angle_deg", value: 0}
    - {name: "max_angle_deg", value: 180}
    - {name: "min_pwm_micro_s", value: 425}
    - {name: "max_pwm_micro_s", value: 2900}
    - {name: "use_hw", value: true}

- node:
    pkg: "servo"
    exec: "servo_node"
    name: "servo_node"
    namespace: "science_cache"
    param:
    - {name: "channel_id", value: 3}
    - {name: "initial_angle_deg", value: 90}
    - {name: "min_angle_deg", value: 0}
    - {name: "max_angle_deg", value: 180}
    - {name: "min_pwm_micro_s", value: 45005}
    - {name: "max_pwm_micro_s", value: 225000}
    - {name: "use_hw", value: true}

